
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f7f4">
<title>Cleaning Checklist Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f7f4;--surface:#ffffff;--accent:#1a7a58;--accent-light:#e8f5f0;
    --text:#1a1a1a;--text-2:#5a5a5a;--text-3:#9a9a9a;
    --border:#e4e2dd;--border-strong:#c8c5be;--done-text:#b0ada6;
    --radius:14px;--font:'Inter',system-ui,sans-serif;
  }
  html{background:var(--bg);min-height:100%}
  body{font-family:var(--font);color:var(--text);font-size:16px;line-height:1.6;background:var(--bg);max-width:700px;margin:0 auto;padding:0 0 100px}

  /* HEADER */
  .header{padding:28px 20px 0;margin-bottom:20px}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
  .brand{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .brand-addr{font-size:12px;color:var(--text-3);margin-bottom:4px;letter-spacing:0}
  .header h1{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
  .header-sub{font-size:14px;color:var(--text-2)}

  /* PROGRESS RING */
  .ring-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px}
  .ring-label{font-size:11px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase}
  .ring{width:52px;height:52px}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:4}
  .ring-fill{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:138.2;stroke-dashoffset:138.2;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)}
  .ring-num{font-size:13px;font-weight:600;fill:var(--text);font-family:var(--font)}

  /* TABS */
  .tab-row{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto}
  .tab-row::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:9px 18px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-size:14px;font-weight:400;font-family:var(--font);transition:all .18s;letter-spacing:-.01em}
  .tab:hover{border-color:var(--border-strong);color:var(--text)}
  .tab.on{background:var(--text);color:var(--surface);border-color:var(--text)}

  /* DATE STRIP */
  .date-strip{display:flex;align-items:center;gap:10px;margin:0 20px 20px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
  .date-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);white-space:nowrap}
  .date-input{border:none;background:transparent;font-size:15px;font-family:var(--font);color:var(--text);flex:1;min-width:0;outline:none;cursor:pointer}
  .prog-pill{display:flex;align-items:center;gap:8px;margin-left:auto}
  .prog-track{width:56px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
  .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s cubic-bezier(.4,0,.2,1);width:0%}
  .prog-txt{font-size:12px;color:var(--text-3);white-space:nowrap;min-width:32px;text-align:right}

  /* CHECKLIST */
  .checklist{display:none}.checklist.on{display:block}

  /* SECTION */
  .section{margin:0 20px 24px}
  .sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .sec-icon{width:28px;height:28px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sec-icon svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .sec-name{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2)}
  .sec-count{font-size:11px;color:var(--text-3);margin-left:auto;background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:2px 8px}

  /* ITEMS CARD */
  .items-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .item{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
  .item:last-child{border-bottom:none}
  .item:active{background:var(--bg)}
  .cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-strong);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:background .2s,border-color .2s}
  .cb svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
  .item.done .cb{background:var(--accent);border-color:var(--accent)}
  .item.done .cb svg{opacity:1}
  .item-body{flex:1;min-width:0}
  .item-text{font-size:15px;line-height:1.5;color:var(--text);transition:color .2s}
  .item.done .item-text{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--border-strong)}
  .item-tip{font-size:13px;color:var(--text-3);margin-top:3px;line-height:1.45}
  .item.done .item-tip{color:var(--border-strong)}
  .badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.05em;background:var(--accent-light);color:var(--accent);padding:2px 7px;border-radius:100px;margin-left:7px;vertical-align:middle;text-transform:uppercase}

  /* GUIDELINES TAB */
  .guidelines-content{margin:0 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
  .guidelines-content h2{font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2);margin-bottom:16px}
  .guideline-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
  .guideline-item:last-child{border-bottom:none;padding-bottom:0}
  .guideline-bullet{width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .guideline-text{font-size:15px;line-height:1.6;color:var(--text-2)}

  /* PHOTO UPLOAD */
  .photo-section{margin:0 20px 16px}
  .photo-section-label{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .photo-section-label span{flex:1;height:1px;background:var(--border);display:block}
  .photo-drop{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .18s,background .18s;background:var(--surface)}
  .photo-drop:hover,.photo-drop.drag{border-color:var(--accent);background:var(--accent-light)}
  .photo-drop input[type=file]{display:none}
  .photo-drop-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
  .photo-drop-icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .photo-drop p{font-size:14px;color:var(--text-2);margin-bottom:4px}
  .photo-drop small{font-size:12px;color:var(--text-3)}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:12px}
  .photo-thumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;background:var(--bg)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-thumb-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;line-height:1}
  .photo-thumb-caption{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* REPORT BUTTON */
  .report-wrap{padding:0 20px 8px}
  .report-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .18s;letter-spacing:.01em}
  .report-btn:hover{background:#155f44;transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,122,88,.25)}
  .report-btn:active{transform:scale(.98);box-shadow:none}
  .report-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

  /* FOOTER */
  .footer-row{display:flex;align-items:center;justify-content:flex-end;padding:8px 20px 0}
  .reset-link{font-size:13px;color:var(--text-3);cursor:pointer;background:none;border:none;font-family:var(--font);text-decoration:underline;text-underline-offset:2px;padding:6px 0}
  .reset-link:hover{color:var(--text-2)}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-family:var(--font);font-size:14px;padding:10px 20px;border-radius:100px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* PRINT STYLES */
  @media print{
    body{max-width:100%;padding:0;background:#fff;font-size:13px}
    .tab-row,.report-wrap,.footer-row,.photo-drop,.photo-thumb-del,.toast{display:none!important}
    .checklist{display:none!important}
    .checklist.printing{display:block!important}
    .header{padding:16px 16px 0}
    .section{margin:0 16px 16px}
    .date-strip{margin:0 16px 12px}
    .photo-grid{page-break-inside:avoid}
    .photo-section{margin:0 16px 12px}
    .items-card{border:1px solid #ccc;border-radius:8px}
    .item{padding:8px 12px}
    .item-text{font-size:13px}
    .item-tip{font-size:11px}
    .brand,.brand-addr,.header h1,.header-sub,.ring-wrap,.ring-label{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .acc{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .photo-grid{grid-template-columns:repeat(4,1fr)}
  }

  @media(prefers-color-scheme:dark){
    :root{--bg:#141412;--surface:#1e1d1a;--text:#f0ede8;--text-2:#a0a09a;--text-3:#6a6a64;--border:#2e2d2a;--border-strong:#484640;--done-text:#4a4a46;--accent-light:#0f2e22;--accent:#2ea87a}
    .ring-num{fill:var(--text)}
  }
  @media(max-width:480px){
    .header h1{font-size:22px}
    .item-text{font-size:15px}
  }
</style>
</head>

      {x:'Trash bags — place one in each bin, extra folded at the bottom.'},
      {x:'Toilet paper — 1 extra roll per bathroom.'},
      {x:'Hand foam soap (castile soap with water).'},
      {x:'Cleaning supplies.'},
      {x:'Dishwasher detergent — 1 per day of upcoming stay.'},
      {x:'Laundry detergent — 1 per day — and sunblock.'},
      {x:'Dish soap (pure castile soap).'},
      {x:'Shampoo & conditioner.'},
      {x:'Coffee — 1 bag per day. Hot cocoa — 1 per guest per stay.'},
      {x:'Sweeteners.'},
      {x:'Q-tips and cotton rounds.',n:1},
      {x:'Deodorant.',n:1},
    ]},
    {t:'Security',items:[
      {x:'Ensure all fans are off.',tip:'1 in each bedroom and 1 switch in the living room.'},
      {x:'See that all keys are accounted for and in the correct location.'},
      {x:'Check that all owner valuables are still in the home.'},
      {x:'Make sure all windows are locked.'},
      {x:'Lock the main door.',tip:'Press # for 2 seconds.'},
      {x:'Notify the homeowner within 24 hours of guest departure if anything is broken or misplaced.'},
      {x:'Take timestamped photos of any damage before cleaning.',n:1},
    ]},
  ]},
};

const GUIDELINES=[
  'Use hosts\' cleaning supplies only: cleaning towels for light cleaning items, and paper towels for heavy, dirty items, such as the toilet and outdoor furniture. Indoor broom by the dryer; outdoor broom on the deck by the sliding door; chemicals in the laundry cabinet or under the kitchen sink. Mop next to the dryer and pads, cleaning towels, Q-tips, brushes, and gloves are located in the master bathroom closet.',
  'Use only the host\'s equipment: the vacuum in the master bedroom closet.',
];

const S={};
function key(tab,s,i){return tab+'_'+s+'_'+i}

function allCounts(){
  let tot=0,done=0;
  ['cleaning','prestay','poststay'].forEach(tab=>{
    D[tab].sections.forEach((sec,s)=>sec.items.forEach((_,i)=>{tot++;if(S[key(tab,s,i)])done++;}));
  });
  return{tot,done};
}
function tabCounts(tab){
  let tot=0,done=0;
  D[tab].sections.forEach((sec,s)=>sec.items.forEach((_,i)=>{tot++;if(S[key(tab,s,i)])done++;}));
  return{tot,done};
}
function updateGlobalRing(){
  const {tot,done}=allCounts();
  const pct=tot?Math.round(done/tot*100):0;
  const offset=138.2-(138.2*pct/100);
  document.getElementById('global-ring').style.strokeDashoffset=offset;
  document.getElementById('global-pct').textContent=pct+'%';
}
function updateTabProgress(tab){
  const {tot,done}=tabCounts(tab);
  const pct=tot?Math.round(done/tot*100):0;
  const pf=document.getElementById('pf_'+tab);
  const pt=document.getElementById('pt_'+tab);
  if(pf)pf.style.width=pct+'%';
  if(pt)pt.textContent=done+'/'+tot;
  updateGlobalRing();
  updateSecCounts(tab);
}
function updateSecCounts(tab){
  D[tab].sections.forEach((sec,s)=>{
    let done=0;
    sec.items.forEach((_,i)=>{if(S[key(tab,s,i)])done++;});
    const el=document.getElementById('sc_'+tab+'_'+s);
    if(el)el.textContent=done+'/'+sec.items.length;
  });
}

function renderPhotoSection(tab){
  const photos=PHOTOS[tab];
  let thumbs='';
  photos.forEach((p,idx)=>{
    thumbs+=`<div class="photo-thumb">
      <img src="${p.dataUrl}" alt="${p.name}">
      <button class="photo-thumb-del" data-tab="${tab}" data-idx="${idx}" aria-label="Remove photo">×</button>
      <div class="photo-thumb-caption">${p.name}</div>
    </div>`;
  });
  return `<div class="photo-section">
    <div class="photo-section-label">Photos <span></span></div>
    <div class="photo-drop" id="drop_${tab}" data-tab="${tab}">
      <input type="file" accept="image/*" multiple id="fileinput_${tab}">
      <div class="photo-drop-icon"><svg viewBox="0 0 24 24">${cameraSVG}</svg></div>
      <p>Add photos to include in report</p>
      <small>Tap to select · JPEG, PNG, HEIC</small>
      ${thumbs?`<div class="photo-grid" id="pgrid_${tab}">${thumbs}</div>`:`<div class="photo-grid" id="pgrid_${tab}"></div>`}
    </div>
  </div>`;
}

function refreshPhotoGrid(tab){
  const grid=document.getElementById('pgrid_'+tab);
  if(!grid)return;
  const photos=PHOTOS[tab];
  grid.innerHTML=photos.map((p,idx)=>`<div class="photo-thumb">
    <img src="${p.dataUrl}" alt="${p.name}">
    <button class="photo-thumb-del" data-tab="${tab}" data-idx="${idx}" aria-label="Remove photo">×</button>
    <div class="photo-thumb-caption">${p.name}</div>
  </div>`).join('');
}

function renderTab(tab){
  const el=document.getElementById(tab);
  const todayVal=new Date().toISOString().split('T')[0];
  const {tot,done}=tabCounts(tab);
  const pct=tot?Math.round(done/tot*100):0;
  const tabLabel={cleaning:'Cleaning',prestay:'Pre-Stay',poststay:'Post-Stay'}[tab];

  let h=`<div class="date-strip">
    <span class="date-label">Date</span>
    <input class="date-input" type="date" id="dt_${tab}" value="${todayVal}" aria-label="Cleaning date">
    <div class="prog-pill">
      <div class="prog-track"><div class="prog-fill" id="pf_${tab}" style="width:${pct}%"></div></div>
      <span class="prog-txt" id="pt_${tab}">${done}/${tot}</span>
    </div>
  </div>`;

  D[tab].sections.forEach((sec,s)=>{
    let sdone=0;sec.items.forEach((_,i)=>{if(S[key(tab,s,i)])sdone++;});
    h+=`<div class="section">
      <div class="sec-header">
        <div class="sec-icon"><svg viewBox="0 0 24 24">${getIcon(sec.t)}</svg></div>
        <span class="sec-name">${sec.t}</span>
        <span class="sec-count" id="sc_${tab}_${s}">${sdone}/${sec.items.length}</span>
      </div>
      <div class="items-card">`;
    sec.items.forEach((item,i)=>{
      const k=key(tab,s,i);
      const dc=S[k]?' done':'';
      const badge=item.n?'<span class="badge">New</span>':'';
      const tip=item.tip?`<div class="item-tip">${item.tip}</div>`:'';
      h+=`<div class="item${dc}" role="checkbox" aria-checked="${!!S[k]}" tabindex="0" data-k="${k}" data-tab="${tab}" data-s="${s}" data-i="${i}">
        <div class="cb"><svg viewBox="0 0 16 14">${checkSVG}</svg></div>
        <div class="item-body"><div class="item-text">${item.x}${badge}</div>${tip}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });

  h+=renderPhotoSection(tab);
  h+=`<div class="report-wrap">
    <button class="report-btn" data-tab="${tab}">
      <svg viewBox="0 0 24 24">${mailSVG}</svg>
      Send Report To Host
    </button>
  </div>
  <div class="footer-row">
    <button class="reset-link" data-reset="${tab}">Reset ${tabLabel} checklist</button>
  </div>`;
  el.innerHTML=h;

  // bind file input
  const fi=document.getElementById('fileinput_'+tab);
  if(fi)fi.addEventListener('change',function(){handleFiles(tab,this.files)});
  const dropEl=document.getElementById('drop_'+tab);
  if(dropEl){
    dropEl.addEventListener('click',function(e){
      if(e.target.classList.contains('photo-thumb-del'))return;
      document.getElementById('fileinput_'+tab).click();
    });
    dropEl.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag')});
    dropEl.addEventListener('dragleave',function(){this.classList.remove('drag')});
    dropEl.addEventListener('drop',function(e){
      e.preventDefault();this.classList.remove('drag');
      handleFiles(tab,e.dataTransfer.files);
    });
  }
}

function renderGuidelines(){
  const el=document.getElementById('guidelines');
  let h=`<div class="guidelines-content">
    <h2>Cleaning Guidelines</h2>`;
  GUIDELINES.forEach((g,i)=>{
    h+=`<div class="guideline-item">
      <div class="guideline-bullet">${i+1}</div>
      <div class="guideline-text">${g}</div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function handleFiles(tab,files){
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=function(e){
      PHOTOS[tab].push({dataUrl:e.target.result,name:file.name});
      refreshPhotoGrid(tab);
    };
    reader.readAsDataURL(file);
  });
}

function toggle(tab,s,i){
  const k=key(tab,s,i);
  S[k]=!S[k];
  const row=document.querySelector(`[data-k="${k}"]`);
  if(row){
    if(S[k]){row.classList.add('done');row.setAttribute('aria-checked','true');}
    else{row.classList.remove('done');row.setAttribute('aria-checked','false');}
  }
  updateTabProgress(tab);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function buildReport(tab){
  const tabLabel={cleaning:'Cleaning',prestay:'Pre-Stay',poststay:'Post-Stay'}[tab];
  const dateEl=document.getElementById('dt_'+tab);
  const dateStr=dateEl?dateEl.value:'';
  const formattedDate=dateStr?new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'(no date)';
  const {tot,done}=tabCounts(tab);
  let lines=[];
  lines.push('CLEANING CHECKLIST REPORT');
  lines.push('12929 Jackson Mill Dr.');
  lines.push(`${tabLabel} | ${formattedDate}`);
  lines.push(`Completed: ${done} of ${tot} items`);
  lines.push('');
  D[tab].sections.forEach((sec,s)=>{
    lines.push(`— ${sec.t} —`);
    sec.items.forEach((item,i)=>{
      const k=key(tab,s,i);
      lines.push(`  ${S[k]?'[✓]':'[ ]'} ${item.x}`);
    });
    lines.push('');
  });
  const photoCount=PHOTOS[tab].length;
  if(photoCount>0)lines.push(`Photos attached: ${photoCount} image(s)`);
  lines.push('Sent from the Rental Cleaning Checklist — 12929 Jackson Mill Dr.');
  return lines.join('\n');
}

function sendReport(tab){
  const tabLabel={cleaning:'Cleaning',prestay:'Pre-Stay',poststay:'Post-Stay'}[tab];
  const dateEl=document.getElementById('dt_'+tab);
  const dateStr=dateEl?dateEl.value:'';
  const formattedDate=dateStr?new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
  const subject=encodeURIComponent(`Cleaning Checklist Report — ${formattedDate}`);
  const body=encodeURIComponent(buildReport(tab));
  const photoCount=PHOTOS[tab].length;
  if(photoCount>0){
    showToast(`Note: ${photoCount} photo(s) must be attached manually to your email.`);
    setTimeout(()=>{window.location.href=`mailto:${HOST_EMAIL}?subject=${subject}&body=${body}`;},1200);
  } else {
    window.location.href=`mailto:${HOST_EMAIL}?subject=${subject}&body=${body}`;
    showToast('Opening your email app…');
  }
}

document.addEventListener('click',function(e){
  // Photo delete
  const del=e.target.closest('.photo-thumb-del');
  if(del){
    e.stopPropagation();
    const tab=del.dataset.tab;
    const idx=parseInt(del.dataset.idx);
    PHOTOS[tab].splice(idx,1);
    refreshPhotoGrid(tab);
    return;
  }
  // Item toggle
  const item=e.target.closest('.item');
  if(item&&item.dataset.k){toggle(item.dataset.tab,+item.dataset.s,+item.dataset.i);return;}
  // Tab switch
  const tabBtn=e.target.closest('.tab[data-tab]');
  if(tabBtn){
    const t=tabBtn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.checklist').forEach(c=>c.classList.remove('on'));
    tabBtn.classList.add('on');
    document.getElementById(t).classList.add('on');
    return;
  }
  // Report button
  const rb=e.target.closest('.report-btn');
  if(rb){sendReport(rb.dataset.tab);return;}
  // Reset
  const rl=e.target.closest('[data-reset]');
  if(rl){
    const t=rl.dataset.reset;
    if(!confirm('Reset this checklist?'))return;
    D[t].sections.forEach((sec,s)=>sec.items.forEach((_,i)=>{S[key(t,s,i)]=false;}));
    PHOTOS[t]=[];
    renderTab(t);updateGlobalRing();
  }
});

document.addEventListener('keydown',function(e){
  if((e.key===' '||e.key==='Enter')&&e.target.classList.contains('item')){
    e.preventDefault();
    toggle(e.target.dataset.tab,+e.target.dataset.s,+e.target.dataset.i);
  }
});

['cleaning','prestay','poststay'].forEach(renderTab);
renderGuidelines();
updateGlobalRing();
</script>
</body>
</html>
